services:
  - type: web
    name: enki-x402-audit-service
    runtime: node
    plan: free
    branch: master
    repo: https://github.com/eNudimmud/x402-audit-service
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: X402_NETWORK
        value: solana:5eykt4UsFvP8NJdTREpY1vzqKqZKvdp
      - key: PAY_TO
        sync: false
      - key: AUDIT_PRICE_USD
        value: 0.04
      - key: FACILITATOR_URL
        value: https://x402.org/facilitator
      - key: CDP_API_KEY
        sync: false
      - key: CDP_API_SECRET
        sync: false
      - key: WANT_MAINNET
        value: false
      - key: WANT_CDP
        value: false
      - key: LLM_PROVIDER
        value: none
